apiVersion: 1

# Carga automaticamente los dashboards JSON de esta carpeta al arrancar Grafana
providers:
  - name: 'ecommers'
    orgId: 1
    folder: 'Ecommers'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
