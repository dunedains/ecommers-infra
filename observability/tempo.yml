server:
  http_listen_port: 3200

# Recibe trazas en formato Zipkin (lo que envian los servicios Spring Boot)
distributor:
  receivers:
    zipkin:

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 1h

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks
