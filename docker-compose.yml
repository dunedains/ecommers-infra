services:

  # ════════════════════════════════════════════════════════════
  #  BASE DE DATOS  —  PostgreSQL 16 (instancia única)
  # ════════════════════════════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    container_name: ecommers-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"          # publicado solo para conectarte con un cliente en desarrollo
    environment:
      POSTGRES_USER: ecommers
      POSTGRES_PASSWORD: ecommers_pass
      POSTGRES_DB: ecommers
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommers -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ════════════════════════════════════════════════════════════
  #  MICROSERVICIOS
  #  (sin puertos publicados: solo accesibles a traves del gateway)
  # ════════════════════════════════════════════════════════════

  productos:
    build:
      context: ./ecommers-productos
      dockerfile: Dockerfile
    image: ecommers-productos
    container_name: ecommers-productos
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/db_productos
      SPRING_DATASOURCE_USERNAME: ecommers
      SPRING_DATASOURCE_PASSWORD: ecommers_pass
    volumes:
      - ./logs/productos:/logs/productos
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy

  users:
    build:
      context: ./ecommers-user
      dockerfile: Dockerfile
    image: ecommers-users
    container_name: ecommers-users
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/db_users
      SPRING_DATASOURCE_USERNAME: ecommers
      SPRING_DATASOURCE_PASSWORD: ecommers_pass
    volumes:
      - ./logs/users:/logs/users
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy

  whitelist:
    build:
      context: ./ecommers-whiltelist
      dockerfile: Dockerfile
    image: ecommers-whitelist
    container_name: ecommers-whitelist
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/db_whitelist
      SPRING_DATASOURCE_USERNAME: ecommers
      SPRING_DATASOURCE_PASSWORD: ecommers_pass
      FEIGN_CLIENT_PRODUCT_URL: http://productos:8081
      FEIGN_CLIENT_USER_URL: http://users:8082
    volumes:
      - ./logs/whitelist:/logs/whitelist
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy

  reviews:
    build:
      context: ./ecommers-reviw
      dockerfile: Dockerfile
    image: ecommers-reviews
    container_name: ecommers-reviews
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/db_reviews
      SPRING_DATASOURCE_USERNAME: ecommers
      SPRING_DATASOURCE_PASSWORD: ecommers_pass
      FEIGN_CLIENT_PRODUCT_URL: http://productos:8081
      FEIGN_CLIENT_USER_URL: http://users:8082
    volumes:
      - ./logs/reviews:/logs/reviews
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy

  inventory:
    build:
      context: ./ecommers-Inventory
      dockerfile: Dockerfile
    image: ecommers-inventory
    container_name: ecommers-inventory
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/db_inventory
      SPRING_DATASOURCE_USERNAME: ecommers
      SPRING_DATASOURCE_PASSWORD: ecommers_pass
      FEIGN_CLIENT_PRODUCT_URL: http://productos:8081
    volumes:
      - ./logs/inventory:/logs/inventory
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy

  cart:
    build:
      context: ./ecommers-cart
      dockerfile: Dockerfile
    image: ecommers-cart
    container_name: ecommers-cart
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/db_cart
      SPRING_DATASOURCE_USERNAME: ecommers
      SPRING_DATASOURCE_PASSWORD: ecommers_pass
      FEIGN_CLIENT_PRODUCT_URL: http://productos:8081
      FEIGN_CLIENT_INVENTORY_URL: http://inventory:8085
    volumes:
      - ./logs/cart:/logs/cart
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy

  notifications:
    build:
      context: ./ecommers-notifications
      dockerfile: Dockerfile
    image: ecommers-notifications
    container_name: ecommers-notifications
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/db_notifications
      SPRING_DATASOURCE_USERNAME: ecommers
      SPRING_DATASOURCE_PASSWORD: ecommers_pass
    volumes:
      - ./logs/notifications:/logs/notifications
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8089/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy

  orders:
    build:
      context: ./ecommers-order
      dockerfile: Dockerfile
    image: ecommers-orders
    container_name: ecommers-orders
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/db_orders
      SPRING_DATASOURCE_USERNAME: ecommers
      SPRING_DATASOURCE_PASSWORD: ecommers_pass
      FEIGN_CLIENT_PRODUCT_URL: http://productos:8081
      FEIGN_CLIENT_NOTIFICATION_URL: http://notifications:8089
    volumes:
      - ./logs/orders:/logs/orders
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8087/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      notifications:
        condition: service_healthy

  pagos:
    build:
      context: ./ecommers-pagos
      dockerfile: Dockerfile
    image: ecommers-pagos
    container_name: ecommers-pagos
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/db_pagos
      SPRING_DATASOURCE_USERNAME: ecommers
      SPRING_DATASOURCE_PASSWORD: ecommers_pass
      FEIGN_CLIENT_ORDER_URL: http://orders:8087
      FEIGN_CLIENT_NOTIFICATION_URL: http://notifications:8089
    volumes:
      - ./logs/pagos:/logs/pagos
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8088/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      orders:
        condition: service_healthy
      notifications:
        condition: service_healthy

  # ════════════════════════════════════════════════════════════
  #  API GATEWAY  (unico punto de entrada publico)
  # ════════════════════════════════════════════════════════════
  gateway:
    build:
      context: ./ecommers-gateway
      dockerfile: Dockerfile
    image: ecommers-gateway
    container_name: ecommers-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: clave-secreta-de-al-menos-256-bits-cambiar-en-produccion-0123456789
      JWT_TTL_SECONDS: 3600
      PRODUCTOS_URI: http://productos:8081
      USERS_URI: http://users:8082
      WHITELIST_URI: http://whitelist:8083
      REVIEWS_URI: http://reviews:8084
      INVENTORY_URI: http://inventory:8085
      CART_URI: http://cart:8086
      ORDERS_URI: http://orders:8087
      PAGOS_URI: http://pagos:8088
      NOTIFICATIONS_URI: http://notifications:8089
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      productos:
        condition: service_healthy
      users:
        condition: service_healthy
      whitelist:
        condition: service_healthy
      reviews:
        condition: service_healthy
      inventory:
        condition: service_healthy
      cart:
        condition: service_healthy
      orders:
        condition: service_healthy
      pagos:
        condition: service_healthy
      notifications:
        condition: service_healthy

volumes:
  postgres_data:
